{{ define "main" }}
<div class="d-flex align-items-center justify-content-between mb-3">
  <h2 class="h5 mb-0 fw-semibold"><i class="bi bi-bullseye me-2"></i>{{ .Title }}</h2>
</div>

<p class="text-muted small mb-3">
  Review and correct the 8 centering lines per side. Mouse wheel to zoom, drag canvas to pan.
  Drag the square endpoint handles to reposition a line. Save writes corrections to BigQuery.
</p>

<div class="card shadow-sm border-0 mb-3">
  <div class="card-body py-3">
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label small fw-medium mb-1">PSA Cert Number</label>
        <input type="text" class="form-control form-control-sm font-monospace"
               id="rv-cert-number" placeholder="e.g. 151808073"
               onkeydown="if(event.key==='Enter') loadCert()">
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary btn-sm w-100" id="btn-rv-load" onclick="loadCert()">
          <i class="bi bi-download me-1"></i>Load
        </button>
      </div>
      <div class="col-md-2">
        <button class="btn btn-success btn-sm w-100" id="btn-rv-save" onclick="saveCorrections()" disabled>
          <i class="bi bi-cloud-upload me-1"></i>Save
        </button>
      </div>
      <div class="col-md-5">
        <div id="rv-status" class="small text-muted"></div>
      </div>
    </div>
  </div>
</div>

<div class="card shadow-sm border-0 mb-3" id="rv-controls" style="display:none">
  <div class="card-body py-2">
    <div class="row g-2 align-items-center small">
      <div class="col-auto"><span class="fw-semibold">Visibility:</span></div>
      <div class="col-auto d-flex align-items-center gap-3">
        <label class="mb-0"><input type="checkbox" id="rv-show-card" checked> card lines</label>
        <label class="mb-0"><input type="checkbox" id="rv-show-art"  checked> art lines</label>
        <label class="mb-0"><input type="checkbox" id="rv-show-handles" checked> handles</label>
        <label class="mb-0"><input type="checkbox" id="rv-show-labels"> labels</label>
      </div>
      <div class="col-auto ms-3 d-flex align-items-center gap-2">
        <label class="mb-0">Card color</label>
        <input type="color" class="form-control form-control-color form-control-sm" id="rv-col-card" value="#00c800">
        <label class="mb-0">Art color</label>
        <input type="color" class="form-control form-control-color form-control-sm" id="rv-col-art"  value="#ffdc00">
      </div>
      <div class="col-auto ms-auto">
        <button class="btn btn-outline-secondary btn-sm" onclick="resetLinesToDetector()">
          <i class="bi bi-arrow-counterclockwise me-1"></i>Reset to detector
        </button>
      </div>
    </div>
  </div>
</div>

<div class="row g-3" id="rv-results" style="display:none">
  <div class="col-md-6">
    <div class="card shadow-sm border-0 h-100">
      <div class="card-header bg-white border-0 py-2 d-flex justify-content-between align-items-center">
        <span class="fw-semibold small">Front <span class="text-muted ms-1" id="rv-front-info"></span></span>
        <button class="btn btn-link btn-sm p-0 text-muted" onclick="resetView('front')" title="Reset zoom/pan">
          <i class="bi bi-arrow-counterclockwise"></i>
        </button>
      </div>
      <div class="card-body p-2">
        <canvas id="rv-canvas-front" style="width:100%; height:78vh; border:1px solid #ddd; border-radius:4px; cursor:grab; background:#222; display:block"></canvas>
        <table class="table table-sm small mb-0 mt-2" id="rv-front-table"></table>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card shadow-sm border-0 h-100">
      <div class="card-header bg-white border-0 py-2 d-flex justify-content-between align-items-center">
        <span class="fw-semibold small">Back <span class="text-muted ms-1" id="rv-back-info"></span></span>
        <button class="btn btn-link btn-sm p-0 text-muted" onclick="resetView('back')" title="Reset zoom/pan">
          <i class="bi bi-arrow-counterclockwise"></i>
        </button>
      </div>
      <div class="card-body p-2">
        <canvas id="rv-canvas-back" style="width:100%; height:78vh; border:1px solid #ddd; border-radius:4px; cursor:grab; background:#222; display:block"></canvas>
        <table class="table table-sm small mb-0 mt-2" id="rv-back-table"></table>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script>
  // ── State per side ───────────────────────────────────────────────────────
  // lines: { card_top: {x0,y0,x1,y1}, ... }   — current working set (editable)
  // detectorLines: same shape but read-only, from the last CV run
  // cvLines: same as detector, kept separately so "Reset" restores the exact
  //          CV output even if detectorLines is mutated.
  const LINE_NAMES = ['card_top','card_bot','card_left','card_right',
                      'art_top','art_bot','art_left','art_right'];
  const sides = {
    front: { data: null, image: null, transform: null, lines: {}, cvLines: {}, imageSize: null },
    back:  { data: null, image: null, transform: null, lines: {}, cvLines: {}, imageSize: null },
  };

  // Drag state (global — only one endpoint can be dragged at a time).
  let drag = null;  // {side, lineName, endpoint: 0|1}
  const HANDLE_RADIUS_PX = 6;          // hit-test radius in canvas pixels

  function setStatus(msg, kind) {
    const el = document.getElementById('rv-status');
    el.textContent = msg || '';
    el.className = 'small ' + (kind === 'error' ? 'text-danger'
                            : kind === 'success' ? 'text-success'
                            : kind === 'info' ? 'text-info' : 'text-muted');
  }

  function fitCanvas(canvas) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
  }

  function computeInitialTransform(canvas, imgW, imgH) {
    const scale = Math.min(canvas.width / imgW, canvas.height / imgH) * 0.98;
    const tx = (canvas.width  - imgW * scale) / 2;
    const ty = (canvas.height - imgH * scale) / 2;
    return { scale, tx, ty };
  }

  function canvasPxToImage(side, cx, cy) {
    const t = sides[side].transform;
    return [(cx - t.tx) / t.scale, (cy - t.ty) / t.scale];
  }
  function imageToCanvasPx(side, ix, iy) {
    const t = sides[side].transform;
    return [ix * t.scale + t.tx, iy * t.scale + t.ty];
  }

  // ── Drawing ──────────────────────────────────────────────────────────────
  function draw(side) {
    const state = sides[side];
    if (!state.image) return;
    const canvas = document.getElementById('rv-canvas-' + side);
    const ctx = canvas.getContext('2d');
    const { scale, tx, ty } = state.transform;

    const colCard = document.getElementById('rv-col-card').value;
    const colArt  = document.getElementById('rv-col-art').value;
    const showCard = document.getElementById('rv-show-card').checked;
    const showArt  = document.getElementById('rv-show-art').checked;
    const showHandles = document.getElementById('rv-show-handles').checked;
    const showLabels  = document.getElementById('rv-show-labels').checked;

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.setTransform(scale, 0, 0, scale, tx, ty);
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(state.image, 0, 0);

    // Lines.
    ctx.lineWidth = Math.max(1, 2 / scale);
    for (const name of LINE_NAMES) {
      const L = state.lines[name];
      if (!L) continue;
      const isCard = name.startsWith('card_');
      if (isCard && !showCard) continue;
      if (!isCard && !showArt) continue;
      ctx.strokeStyle = isCard ? colCard : colArt;
      ctx.beginPath();
      ctx.moveTo(L.x0, L.y0);
      ctx.lineTo(L.x1, L.y1);
      ctx.stroke();
      if (showLabels) {
        ctx.fillStyle = isCard ? colCard : colArt;
        ctx.font = `${10 / scale}px sans-serif`;
        const mx = (L.x0 + L.x1) / 2, my = (L.y0 + L.y1) / 2;
        ctx.fillText(name, mx + 4/scale, my - 4/scale);
      }
    }

    // Handle dots. Drawn in CANVAS space so their size doesn't scale with
    // zoom — always 6px radius regardless of image scale.
    if (showHandles) {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      for (const name of LINE_NAMES) {
        const L = state.lines[name];
        if (!L) continue;
        const isCard = name.startsWith('card_');
        if (isCard && !showCard) continue;
        if (!isCard && !showArt) continue;
        ctx.fillStyle   = isCard ? colCard : colArt;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        for (const ep of [0, 1]) {
          const [cx, cy] = imageToCanvasPx(side, ep === 0 ? L.x0 : L.x1, ep === 0 ? L.y0 : L.y1);
          ctx.beginPath();
          ctx.rect(cx - HANDLE_RADIUS_PX, cy - HANDLE_RADIUS_PX, HANDLE_RADIUS_PX*2, HANDLE_RADIUS_PX*2);
          ctx.fill();
          ctx.stroke();
        }
      }
    }
  }

  function redrawAll() { draw('front'); draw('back'); }

  // ── Interaction: pan, zoom, and endpoint drag ────────────────────────────
  function attachViewer(side) {
    const canvas = document.getElementById('rv-canvas-' + side);

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (!sides[side].transform) return;
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const cx = (e.clientX - rect.left) * dpr;
      const cy = (e.clientY - rect.top)  * dpr;
      const factor = e.deltaY < 0 ? 1.2 : 1 / 1.2;
      const t = sides[side].transform;
      const imgX = (cx - t.tx) / t.scale;
      const imgY = (cy - t.ty) / t.scale;
      t.scale *= factor;
      t.tx = cx - imgX * t.scale;
      t.ty = cy - imgY * t.scale;
      draw(side);
    }, { passive: false });

    let panState = null;
    canvas.addEventListener('mousedown', (e) => {
      if (!sides[side].transform) return;
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const cx = (e.clientX - rect.left) * dpr;
      const cy = (e.clientY - rect.top)  * dpr;

      const hit = hitTestHandle(side, cx, cy);
      if (hit) {
        drag = { side, ...hit };
        canvas.style.cursor = 'grabbing';
        return;
      }
      panState = { lastX: e.clientX, lastY: e.clientY };
      canvas.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
      // Dragging an endpoint.
      if (drag && drag.side === side) {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const cx = (e.clientX - rect.left) * dpr;
        const cy = (e.clientY - rect.top)  * dpr;
        const [ix, iy] = canvasPxToImage(side, cx, cy);
        const L = sides[side].lines[drag.lineName];
        if (drag.endpoint === 0) { L.x0 = ix; L.y0 = iy; }
        else                     { L.x1 = ix; L.y1 = iy; }
        draw(side);
        return;
      }
      // Panning.
      if (!panState) return;
      const dpr = window.devicePixelRatio || 1;
      const t = sides[side].transform;
      if (!t) return;
      t.tx += (e.clientX - panState.lastX) * dpr;
      t.ty += (e.clientY - panState.lastY) * dpr;
      panState.lastX = e.clientX;
      panState.lastY = e.clientY;
      draw(side);
    });

    window.addEventListener('mouseup', () => {
      panState = null;
      if (drag && drag.side === side) {
        drag = null;
      }
      canvas.style.cursor = 'grab';
    });

    canvas.addEventListener('dblclick', () => resetView(side));
  }

  // Return {lineName, endpoint} if the canvas point (cx, cy) is within a
  // handle's hit radius. Prefers handles drawn last (art over card) so the
  // visible topmost handle wins.
  function hitTestHandle(side, cx, cy) {
    const state = sides[side];
    const showCard = document.getElementById('rv-show-card').checked;
    const showArt  = document.getElementById('rv-show-art').checked;
    const showHandles = document.getElementById('rv-show-handles').checked;
    if (!showHandles) return null;
    // Iterate in reverse draw order so the topmost handle hits first.
    const ordered = LINE_NAMES.slice().reverse();
    for (const name of ordered) {
      const L = state.lines[name];
      if (!L) continue;
      const isCard = name.startsWith('card_');
      if (isCard && !showCard) continue;
      if (!isCard && !showArt) continue;
      for (const ep of [0, 1]) {
        const [hx, hy] = imageToCanvasPx(side, ep === 0 ? L.x0 : L.x1, ep === 0 ? L.y0 : L.y1);
        if (Math.abs(cx - hx) <= HANDLE_RADIUS_PX && Math.abs(cy - hy) <= HANDLE_RADIUS_PX) {
          return { lineName: name, endpoint: ep };
        }
      }
    }
    return null;
  }

  function resetView(side) {
    const state = sides[side];
    if (!state.image || !state.imageSize) return;
    const canvas = document.getElementById('rv-canvas-' + side);
    fitCanvas(canvas);
    state.transform = computeInitialTransform(canvas, state.imageSize.w, state.imageSize.h);
    draw(side);
  }

  function resetLinesToDetector() {
    for (const side of ['front','back']) {
      const state = sides[side];
      if (!state.cvLines) continue;
      state.lines = {};
      for (const name of LINE_NAMES) {
        if (state.cvLines[name]) state.lines[name] = { ...state.cvLines[name] };
      }
      renderLinesTable(side);
    }
    redrawAll();
    setStatus('Reset to detector output', 'info');
  }

  // ── Data wiring ──────────────────────────────────────────────────────────
  function linesFromCVResponse(cvLines) {
    // cvLines is the /centering-cv/.../lines object: { name: {x0,y0,x1,y1,kind,n_points} }.
    const out = {};
    for (const name of LINE_NAMES) {
      const L = cvLines?.[name];
      if (!L) continue;
      out[name] = { x0: L.x0, y0: L.y0, x1: L.x1, y1: L.y1 };
    }
    return out;
  }

  function renderLinesTable(side) {
    const tbl = document.getElementById(`rv-${side}-table`);
    const state = sides[side];
    if (!state.lines || Object.keys(state.lines).length === 0) {
      tbl.innerHTML = '';
      return;
    }
    tbl.innerHTML = `<thead><tr>
        <th class="text-muted fw-normal">line</th>
        <th class="text-muted fw-normal text-end">x0</th>
        <th class="text-muted fw-normal text-end">y0</th>
        <th class="text-muted fw-normal text-end">x1</th>
        <th class="text-muted fw-normal text-end">y1</th>
      </tr></thead><tbody>` + LINE_NAMES.map(name => {
        const L = state.lines[name];
        if (!L) return '';
        const f = v => v.toFixed(1);
        return `<tr>
          <td class="font-monospace">${name}</td>
          <td class="font-monospace text-end">${f(L.x0)}</td>
          <td class="font-monospace text-end">${f(L.y0)}</td>
          <td class="font-monospace text-end">${f(L.x1)}</td>
          <td class="font-monospace text-end">${f(L.y1)}</td>
        </tr>`;
      }).join('') + '</tbody>';
  }

  async function loadSide(side, cvData, savedCorrections) {
    const state = sides[side];
    state.data = cvData;
    state.imageSize = cvData.image_size;
    state.cvLines = linesFromCVResponse(cvData.lines);

    // If saved corrections exist for this side, use them as the starting
    // point. Otherwise, start from the detector lines.
    const initialLines = {};
    for (const name of LINE_NAMES) {
      if (savedCorrections?.[name]) {
        const c = savedCorrections[name];
        initialLines[name] = { x0: c.x0, y0: c.y0, x1: c.x1, y1: c.y1 };
      } else if (state.cvLines[name]) {
        initialLines[name] = { ...state.cvLines[name] };
      }
    }
    state.lines = initialLines;

    // Load the base image.
    await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => { state.image = img; resolve(); };
      img.onerror = reject;
      img.src = 'data:image/png;base64,' + cvData.base_png_b64;
    });

    resetView(side);
    renderLinesTable(side);

    const info = document.getElementById(`rv-${side}-info`);
    const correctedCount = Object.keys(savedCorrections || {}).length;
    info.textContent = correctedCount > 0
      ? `${correctedCount}/8 previously corrected`
      : `detector defaults`;
  }

  async function loadCert() {
    const cert = document.getElementById('rv-cert-number').value.trim();
    if (!/^\d{7,10}$/.test(cert)) {
      setStatus('Enter a valid cert number (7-10 digits)', 'error');
      return;
    }
    const btn = document.getElementById('btn-rv-load');
    btn.disabled = true;
    const prev = btn.innerHTML;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    setStatus(`Loading ${cert}…`, 'info');

    try {
      const [front, back, savedResp] = await Promise.all([
        api('GET', `/centering-cv/${cert}/front`),
        api('GET', `/centering-cv/${cert}/back`),
        api('GET', `/certs/${cert}/centering-corrections`).catch(() => null),
      ]);
      const saved = savedResp?.corrections || { front: {}, back: {} };
      await Promise.all([
        loadSide('front', front, saved.front),
        loadSide('back',  back,  saved.back),
      ]);
      document.getElementById('rv-results').style.display = '';
      document.getElementById('rv-controls').style.display = '';
      document.getElementById('btn-rv-save').disabled = false;
      setStatus(`Loaded ${cert}. Drag handles to correct, then Save.`, 'success');
    } catch (e) {
      setStatus(`Load failed: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = prev;
    }
  }

  async function saveCorrections() {
    const cert = document.getElementById('rv-cert-number').value.trim();
    if (!/^\d{7,10}$/.test(cert)) {
      setStatus('No cert loaded', 'error');
      return;
    }
    const btn = document.getElementById('btn-rv-save');
    btn.disabled = true;
    const prev = btn.innerHTML;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    setStatus(`Saving…`, 'info');

    const userEmail = firebase.auth().currentUser?.email || '';
    try {
      for (const side of ['front', 'back']) {
        const state = sides[side];
        if (!state.imageSize) continue;
        const lines = [];
        for (const name of LINE_NAMES) {
          const L = state.lines[name];
          if (!L) continue;
          const cv = state.cvLines[name];
          lines.push({
            line_name: name,
            x0: L.x0, y0: L.y0, x1: L.x1, y1: L.y1,
            cv_x0: cv?.x0, cv_y0: cv?.y0, cv_x1: cv?.x1, cv_y1: cv?.y1,
          });
        }
        await api('POST', `/certs/${cert}/centering-corrections`, {
          side,
          image_w: state.imageSize.w,
          image_h: state.imageSize.h,
          corrected_by: userEmail,
          lines,
        });
      }
      setStatus(`Saved corrections for ${cert}`, 'success');
    } catch (e) {
      setStatus(`Save failed: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = prev;
    }
  }

  // ── Wire up UI ───────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    attachViewer('front');
    attachViewer('back');
    ['rv-col-card','rv-col-art','rv-show-card','rv-show-art','rv-show-handles','rv-show-labels']
      .forEach(id => document.getElementById(id).addEventListener('input', redrawAll));
    window.addEventListener('resize', () => { resetView('front'); resetView('back'); });
  });
</script>
{{ end }}
