{{ define "main" }}
<div class="d-flex align-items-center justify-content-between mb-3">
  <h2 class="h5 mb-0 fw-semibold"><i class="bi bi-lightning me-2"></i>{{ .Title }}</h2>
</div>

<p class="text-muted small mb-3">
  Look up a cert on PSA, drag the front/back scans here, then run CV centering.
</p>

<!-- ── Step 1: Cert lookup ───────────────────────────────────────────────── -->
<div class="card shadow-sm border-0 mb-3">
  <div class="card-header bg-white border-0 py-2">
    <span class="fw-semibold small">1. Look Up Cert</span>
  </div>
  <div class="card-body py-3">
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label small fw-medium mb-1">PSA Cert Number</label>
        <input type="text" class="form-control form-control-sm font-monospace"
               id="cert-number" placeholder="e.g. 151808073"
               onkeydown="if(event.key==='Enter') runLookup()">
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary btn-sm w-100" id="btn-lookup" onclick="runLookup()">
          <i class="bi bi-search me-1"></i>Lookup
        </button>
      </div>
      <div class="col-md-7">
        <div id="lookup-status" class="small text-muted"></div>
      </div>
    </div>

    <div id="lookup-results" class="mt-3" style="display:none">
      <table class="table table-sm small mb-0">
        <tbody id="lookup-table"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── Step 2: Drop front/back scans ─────────────────────────────────────── -->
<div id="scan-section" style="display:none">
  <div class="card shadow-sm border-0 mb-3">
    <div class="card-header bg-white border-0 py-2">
      <span class="fw-semibold small">2. Drop Front & Back Scans</span>
      <span class="text-muted small ms-2">Drag images from the PSA cert page</span>
    </div>
    <div class="card-body py-3">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="drop-target" id="drop-front"
               ondragover="event.preventDefault(); this.style.borderColor='#0d6efd'"
               ondragleave="this.style.borderColor='#ccc'"
               ondrop="handleScanDrop(event, 'front')"
               onclick="document.getElementById('file-front').click()"
               style="border:2px dashed #ccc; border-radius:8px; min-height:200px;
                      display:flex; align-items:center; justify-content:center;
                      cursor:pointer; overflow:hidden; background:#fafafa">
            <div id="drop-front-placeholder" class="text-center text-muted">
              <i class="bi bi-image" style="font-size:2rem"></i>
              <div class="mt-1 small">Front scan</div>
            </div>
            <img id="drop-front-preview" style="max-width:100%; max-height:300px; object-fit:contain; display:none">
          </div>
          <input type="file" id="file-front" accept="image/*" style="display:none"
                 onchange="handleFileInput(this.files, 'front')">
        </div>
        <div class="col-md-6">
          <div class="drop-target" id="drop-back"
               ondragover="event.preventDefault(); this.style.borderColor='#0d6efd'"
               ondragleave="this.style.borderColor='#ccc'"
               ondrop="handleScanDrop(event, 'back')"
               onclick="document.getElementById('file-back').click()"
               style="border:2px dashed #ccc; border-radius:8px; min-height:200px;
                      display:flex; align-items:center; justify-content:center;
                      cursor:pointer; overflow:hidden; background:#fafafa">
            <div id="drop-back-placeholder" class="text-center text-muted">
              <i class="bi bi-image" style="font-size:2rem"></i>
              <div class="mt-1 small">Back scan</div>
            </div>
            <img id="drop-back-preview" style="max-width:100%; max-height:300px; object-fit:contain; display:none">
          </div>
          <input type="file" id="file-back" accept="image/*" style="display:none"
                 onchange="handleFileInput(this.files, 'back')">
        </div>
      </div>
      <div class="mt-3 d-flex gap-2 align-items-center">
        <button class="btn btn-success btn-sm" id="btn-upload-cv" onclick="uploadAndRunCV()" disabled>
          <i class="bi bi-cloud-upload me-1"></i>Upload & Run CV Centering
        </button>
        <div id="upload-status" class="small text-muted"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Step 3: CV Centering results ──────────────────────────────────────── -->
<div id="cv-results" style="display:none">
  <div class="d-flex align-items-center justify-content-between mb-2">
    <h5 class="h6 fw-semibold mb-0">3. CV Centering Results</h5>
    <div class="d-flex gap-3 small">
      <label><input type="checkbox" id="show-crops" checked> crops</label>
      <label><input type="checkbox" id="show-points" checked> points</label>
      <label><input type="checkbox" id="show-lines" checked> lines</label>
      <label><input type="checkbox" id="show-labels"> labels</label>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-header bg-white border-0 py-2 d-flex justify-content-between align-items-center">
          <span class="fw-semibold small">Front <span class="text-muted ms-1" id="cv-front-info"></span></span>
          <button class="btn btn-link btn-sm p-0 text-muted" onclick="resetView('front')" title="Reset zoom/pan">
            <i class="bi bi-arrow-counterclockwise"></i>
          </button>
        </div>
        <div class="card-body p-2">
          <canvas id="canvas-front"
                  style="width:100%; height:60vh; border:1px solid #ddd; border-radius:4px;
                         cursor:grab; background:#222; display:block"></canvas>
          <table class="table table-sm small mb-0 mt-2" id="cv-front-table"></table>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-header bg-white border-0 py-2 d-flex justify-content-between align-items-center">
          <span class="fw-semibold small">Back <span class="text-muted ms-1" id="cv-back-info"></span></span>
          <button class="btn btn-link btn-sm p-0 text-muted" onclick="resetView('back')" title="Reset zoom/pan">
            <i class="bi bi-arrow-counterclockwise"></i>
          </button>
        </div>
        <div class="card-body p-2">
          <canvas id="canvas-back"
                  style="width:100%; height:60vh; border:1px solid #ddd; border-radius:4px;
                         cursor:grab; background:#222; display:block"></canvas>
          <table class="table table-sm small mb-0 mt-2" id="cv-back-table"></table>
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let lookupData = null;
  const scanFiles = { front: null, back: null };

  // ── Lookup ─────────────────────────────────────────────────────────────────
  function setLookupStatus(msg, kind) {
    const el = document.getElementById('lookup-status');
    el.textContent = msg || '';
    el.className = 'small ' + (kind === 'error' ? 'text-danger'
                              : kind === 'success' ? 'text-success'
                              : kind === 'info' ? 'text-info' : 'text-muted');
  }

  async function runLookup() {
    const cert = document.getElementById('cert-number').value.trim();
    if (!/^\d{7,10}$/.test(cert)) {
      setLookupStatus('Enter a valid cert number (7-10 digits)', 'error');
      return;
    }
    const btn = document.getElementById('btn-lookup');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Looking up...';
    setLookupStatus(`Looking up cert ${cert}...`, 'info');

    try {
      const data = await api('GET', `/certs/${cert}/lookup`);
      lookupData = data;
      renderLookup(cert, data);

      // Open PSA cert page so user can grab the scans
      window.open(`https://www.psacard.com/cert/${cert}`, '_blank');

      document.getElementById('scan-section').style.display = '';
      setLookupStatus('PSA cert page opened in new tab. Drag the scans below.', 'success');
      checkUploadReady();
    } catch (e) {
      setLookupStatus(`Lookup failed: ${e.message}`, 'error');
      document.getElementById('lookup-results').style.display = 'none';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-search me-1"></i>Lookup';
    }
  }

  function renderLookup(cert, data) {
    const table = document.getElementById('lookup-table');
    const rows = [
      ['Cert #', `<span class="font-monospace fw-bold">${cert}</span>`],
      ['Grade', `<span class="badge ${data.grade >= 10 ? 'bg-success' : data.grade >= 9 ? 'bg-primary' : 'bg-secondary'}">${data.grading_company || 'PSA'} ${data.grade}</span>`],
      ['Card', data.card_name || '\u2014'],
      ['Set', `${data.set_code || '\u2014'} <span class="text-muted">(${data.game || '\u2014'})</span>`],
      ['Year', data.era || data.psa_year || '\u2014'],
      ['Rarity', data.rarity || '\u2014'],
      ['Treatment', data.treatment || '\u2014'],
    ];
    if (data.existing_card) {
      rows.push(['Status', '<span class="badge bg-info">Already in system</span>']);
    }
    table.innerHTML = rows.map(([k, v]) =>
      `<tr><td class="fw-medium text-muted" style="width:100px">${k}</td><td>${v}</td></tr>`
    ).join('');
    document.getElementById('lookup-results').style.display = '';
  }

  // ── Scan drop handling ─────────────────────────────────────────────────────
  function handleScanDrop(e, side) {
    e.preventDefault();
    e.currentTarget.style.borderColor = '#ccc';

    // Try to get image from drag (could be URL drag from browser or file)
    const files = e.dataTransfer.files;
    if (files.length) {
      setScanFile(files[0], side);
      return;
    }

    // Handle image dragged directly from a web page (URL)
    const url = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
    if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
      loadImageFromUrl(url, side);
      return;
    }

    // Handle image dragged as HTML (e.g. <img> from page)
    const html = e.dataTransfer.getData('text/html');
    if (html) {
      const m = html.match(/src="([^"]+)"/);
      if (m && m[1]) {
        loadImageFromUrl(m[1], side);
        return;
      }
    }

    showToast('Could not read the dropped image. Try right-click > Save Image, then drop the file.', 'warning');
  }

  function handleFileInput(files, side) {
    if (files && files.length) setScanFile(files[0], side);
  }

  function setScanFile(file, side) {
    if (!file.type.startsWith('image/')) {
      showToast('Please drop an image file', 'warning');
      return;
    }
    scanFiles[side] = file;
    showScanPreview(file, side);
    checkUploadReady();
  }

  function loadImageFromUrl(url, side) {
    // Fetch the image via a proxy-less approach: create an img, draw to canvas, get blob
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      canvas.getContext('2d').drawImage(img, 0, 0);
      canvas.toBlob((blob) => {
        if (blob) {
          const file = new File([blob], `${side}.jpg`, { type: 'image/jpeg' });
          scanFiles[side] = file;
          // Show the original image URL as preview
          document.getElementById(`drop-${side}-preview`).src = url;
          document.getElementById(`drop-${side}-preview`).style.display = '';
          document.getElementById(`drop-${side}-placeholder`).style.display = 'none';
          checkUploadReady();
        }
      }, 'image/jpeg', 0.95);
    };
    img.onerror = () => {
      // CORS blocked — show the URL as preview but ask user to save locally
      document.getElementById(`drop-${side}-preview`).src = url;
      document.getElementById(`drop-${side}-preview`).style.display = '';
      document.getElementById(`drop-${side}-placeholder`).style.display = 'none';

      // Try fetching as blob directly
      fetch(url, { mode: 'no-cors' }).catch(() => {});
      showToast(`CORS blocked for ${side} scan. Right-click the image on PSA, "Save Image As", then drop the saved file here.`, 'warning');
    };
    img.src = url;
  }

  function showScanPreview(file, side) {
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById(`drop-${side}-preview`).src = e.target.result;
      document.getElementById(`drop-${side}-preview`).style.display = '';
      document.getElementById(`drop-${side}-placeholder`).style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function checkUploadReady() {
    const ready = lookupData && scanFiles.front && scanFiles.back;
    document.getElementById('btn-upload-cv').disabled = !ready;
  }

  // ── Upload scans + run CV ──────────────────────────────────────────────────
  function setUploadStatus(msg, kind) {
    const el = document.getElementById('upload-status');
    el.textContent = msg || '';
    el.className = 'small ' + (kind === 'error' ? 'text-danger'
                              : kind === 'success' ? 'text-success'
                              : kind === 'info' ? 'text-info' : 'text-muted');
  }

  async function uploadAndRunCV() {
    const cert = document.getElementById('cert-number').value.trim();
    if (!lookupData || !scanFiles.front || !scanFiles.back) return;

    const btn = document.getElementById('btn-upload-cv');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Uploading...';

    try {
      // Convert files to base64 for scraped-submit
      setUploadStatus('Reading scan files...', 'info');
      const [frontB64, backB64] = await Promise.all([
        fileToBase64(scanFiles.front),
        fileToBase64(scanFiles.back),
      ]);

      // Submit via scraped-submit (creates BQ record + uploads to GCS)
      setUploadStatus('Uploading scans to GCS...', 'info');
      const submitPayload = {
        cert_number: cert,
        fields: {
          'Item Grade':       lookupData.psa_grade_text || '',
          'Year':             lookupData.psa_year || lookupData.era || '',
          'Brand/Title':      lookupData.psa_brand || '',
          'Subject':          lookupData.psa_subject || '',
          'Card Number':      lookupData.card_number || '',
          'Category':         lookupData.psa_category || '',
          'Variety/Pedigree': lookupData.psa_variety || '',
        },
        scans: [
          { url: '', data: frontB64, content_type: scanFiles.front.type || 'image/jpeg' },
          { url: '', data: backB64,  content_type: scanFiles.back.type  || 'image/jpeg' },
        ],
        role: 'candidate',
      };
      await api('POST', '/certs/scraped-submit', submitPayload);

      // Run CV centering
      setUploadStatus('Running CV centering pipeline...', 'info');
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Running CV...';
      document.getElementById('cv-results').style.display = '';

      const [front, back] = await Promise.all([
        api('GET', `/centering-cv/${cert}/front`),
        api('GET', `/centering-cv/${cert}/back`),
      ]);
      await Promise.all([loadSide('front', front), loadSide('back', back)]);
      setUploadStatus(`Done! CV centering complete for ${cert}.`, 'success');
    } catch (e) {
      setUploadStatus(`Failed: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-cloud-upload me-1"></i>Upload & Run CV Centering';
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        // Strip the data:...;base64, prefix
        const b64 = reader.result.split(',')[1];
        resolve(b64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ── Canvas rendering ───────────────────────────────────────────────────────
  const cvSides = {
    front: { data: null, image: null, transform: null },
    back:  { data: null, image: null, transform: null },
  };

  function fitCanvas(canvas) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
  }

  function computeInitialTransform(canvas, imgW, imgH) {
    const scale = Math.min(canvas.width / imgW, canvas.height / imgH) * 0.98;
    const tx = (canvas.width  - imgW * scale) / 2;
    const ty = (canvas.height - imgH * scale) / 2;
    return { scale, tx, ty };
  }

  function draw(side) {
    const state = cvSides[side];
    if (!state.data || !state.image) return;
    const canvas = document.getElementById('canvas-' + side);
    const ctx = canvas.getContext('2d');
    const { scale, tx, ty } = state.transform;
    const data = state.data;

    const showCrops  = document.getElementById('show-crops').checked;
    const showPoints = document.getElementById('show-points').checked;
    const showLines  = document.getElementById('show-lines').checked;
    const showLabels = document.getElementById('show-labels').checked;

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.setTransform(scale, 0, 0, scale, tx, ty);
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(state.image, 0, 0);

    if (showCrops && data.crops) {
      ctx.strokeStyle = '#0080ff';
      ctx.lineWidth = Math.max(0.5, 1 / scale);
      ctx.font = `${10 / scale}px sans-serif`;
      ctx.fillStyle = '#0080ff';
      for (const c of data.crops) {
        ctx.strokeRect(c.x, c.y, c.w, c.h);
        if (showLabels) ctx.fillText(c.name, c.x + 2, c.y + 10 / scale);
      }
    }

    if (showPoints && data.detections) {
      const rPt = Math.max(1, 2 / scale);
      for (const d of data.detections) {
        const cardKept = new Set(d.card_kept);
        const artKept  = new Set(d.art_kept);
        for (let i = 0; i < d.card_points.length; i++) {
          const [x, y] = d.card_points[i];
          if (!cardKept.has(i)) continue;
          ctx.beginPath();
          ctx.arc(x, y, rPt, 0, Math.PI * 2);
          ctx.fillStyle = '#00c800'; ctx.fill();
        }
        for (let i = 0; i < d.art_points.length; i++) {
          const [x, y] = d.art_points[i];
          if (!artKept.has(i)) continue;
          ctx.beginPath();
          ctx.arc(x, y, rPt, 0, Math.PI * 2);
          ctx.fillStyle = '#ffdc00'; ctx.fill();
        }
      }
    }

    if (showLines && data.lines) {
      ctx.lineWidth = Math.max(1, 2 / scale);
      for (const [name, L] of Object.entries(data.lines)) {
        if (!L) continue;
        ctx.strokeStyle = L.kind === 'card' ? '#00c800' : '#ffdc00';
        ctx.beginPath();
        ctx.moveTo(L.x0, L.y0);
        ctx.lineTo(L.x1, L.y1);
        ctx.stroke();
      }
    }
  }

  function redrawAll() { draw('front'); draw('back'); }

  function attachViewer(side) {
    const canvas = document.getElementById('canvas-' + side);
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const state = cvSides[side];
      if (!state.transform) return;
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const cx = (e.clientX - rect.left) * dpr;
      const cy = (e.clientY - rect.top)  * dpr;
      const factor = e.deltaY < 0 ? 1.2 : 1 / 1.2;
      const t = state.transform;
      const imgX = (cx - t.tx) / t.scale;
      const imgY = (cy - t.ty) / t.scale;
      t.scale *= factor;
      t.tx = cx - imgX * t.scale;
      t.ty = cy - imgY * t.scale;
      draw(side);
    }, { passive: false });

    let dragging = false, lastX = 0, lastY = 0;
    canvas.addEventListener('mousedown', (e) => {
      dragging = true; lastX = e.clientX; lastY = e.clientY;
      canvas.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const dpr = window.devicePixelRatio || 1;
      const t = cvSides[side].transform;
      if (!t) return;
      t.tx += (e.clientX - lastX) * dpr;
      t.ty += (e.clientY - lastY) * dpr;
      lastX = e.clientX; lastY = e.clientY;
      draw(side);
    });
    window.addEventListener('mouseup', () => {
      dragging = false;
      document.getElementById('canvas-front').style.cursor = 'grab';
      document.getElementById('canvas-back').style.cursor = 'grab';
    });
    canvas.addEventListener('dblclick', () => resetView(side));
  }

  function resetView(side) {
    const state = cvSides[side];
    if (!state.data || !state.image) return;
    const canvas = document.getElementById('canvas-' + side);
    fitCanvas(canvas);
    state.transform = computeInitialTransform(canvas, state.data.image_size.w, state.data.image_size.h);
    draw(side);
  }

  function renderMeasurements(side, data) {
    const table = document.getElementById(`cv-${side}-table`);
    const info = document.getElementById(`cv-${side}-info`);
    const meas = data.measurements || [];
    const labels = { lr_top:'LR top', lr_bot:'LR bot', tb_left:'TB left', tb_right:'TB right' };

    if (meas.length) {
      table.innerHTML = `<thead><tr>
          <th class="text-muted fw-normal">position</th>
          <th class="text-muted fw-normal text-end">a</th><th></th>
          <th class="text-muted fw-normal">b</th>
          <th class="text-muted fw-normal text-end">ratio</th>
        </tr></thead><tbody>` + meas.map(m => `<tr>
          <td class="fw-medium">${labels[m.position] || m.position}</td>
          <td class="font-monospace text-end">${m.left_px}px</td>
          <td class="text-muted">/</td>
          <td class="font-monospace">${m.right_px}px</td>
          <td class="text-end"><span class="badge bg-secondary">${m.ratio}</span></td>
        </tr>`).join('') + '</tbody>';
    } else {
      table.innerHTML = `<tr><td class="text-danger">${data.error || 'No measurements (line fit incomplete)'}</td></tr>`;
    }

    const dets = data.detections || [];
    const lowConf = dets.filter(d => Math.min(d.card_score ?? 0, d.art_score ?? 0) < 0.30).length;
    info.textContent = `${dets.length} crops \u00b7 ${lowConf} low-confidence`;
  }

  async function loadSide(side, data) {
    cvSides[side].data = data;
    const img = new Image();
    img.onload = () => {
      cvSides[side].image = img;
      resetView(side);
    };
    img.src = 'data:image/png;base64,' + data.base_png_b64;
    renderMeasurements(side, data);
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    attachViewer('front');
    attachViewer('back');
    ['show-crops','show-points','show-lines','show-labels']
      .forEach(id => document.getElementById(id).addEventListener('input', redrawAll));
    window.addEventListener('resize', () => { resetView('front'); resetView('back'); });
  });
</script>
{{ end }}
